version: 1
layout: { mode: layered, spacing: 4 }
defaults:
  channel:
    speed: 1500
nodes:
  OpsAgent: { model: client }
  Coordinator: { model: server }
  FitnessAgent: { model: server }
  SecurityAgent: { model: server }
  SafetyAgent: { model: server }
  HITLAgent: { model: server }
  Escalator: { model: server }
  SpeedDialDeployer: { model: server }
  SpeedDialHost: { model: server }
  Host: { model: server }
  SourceRepo: { model: server }
  AgentBus: { model: bus }
channels:
  toolCallRequest:
    {
      publishers: [OpsAgent, SpeedDialHost],
      subscribers: [OpsAgent, SpeedDialHost],
      color: '#88aaff',
    }
  toolInvocation:
    { publishers: [SpeedDialHost, Host], subscribers: [Host, SpeedDialHost], color: '#88aaff' }
  approvalRequest:
    { publishers: [OpsAgent, Coordinator], subscribers: [OpsAgent, Coordinator], color: '#88aaff' }
  agentCommittee:
    {
      publishers: [Coordinator, FitnessAgent, SecurityAgent, SafetyAgent, HITLAgent],
      subscribers: [Coordinator, FitnessAgent, SecurityAgent, SafetyAgent, HITLAgent],
      color: '#bbbb44',
    }
  escalationRequest:
    {
      publishers: [Coordinator, Escalator],
      subscribers: [Coordinator, Escalator],
      color: '#44aabb',
    }
  publishRequest: { publishers: [Coordinator], subscribers: [SpeedDialDeployer], color: '#aa44aa' }
  commitSource: { publishers: [OpsAgent], subscribers: [SourceRepo], color: '#44aabb' }
  reviewSource:
    {
      publishers: [SpeedDialDeployer, FitnessAgent, SecurityAgent, SafetyAgent, HITLAgent],
      subscribers: [SourceRepo],
      color: '#44aabb',
    }
  publishTool: { publishers: [SpeedDialDeployer], subscribers: [Host], color: '#aa44aa' }
  notifyAgentBus: { publishers: [SpeedDialHost], subscribers: [AgentBus], color: '#aa44aa' }
